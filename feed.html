<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community Feed - NeighbourHub</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <nav>
        <div class="logo"><h2>NeighbourHub</h2></div>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="feed.html">Community</a></li>
        </ul>
    </nav>

    <main class="container">
        <div class="card">
            <h3>Share with your community</h3>
            <textarea id="postContent" placeholder="What's happening in your neighborhood?" style="width: 100%; height: 80px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; padding: 10px;"></textarea>
            <button onclick="addPost()">Post</button>
        </div>
        
        <div id="feedList" style="margin-top: 2rem;">
        </div>
    </main>

    <script src="js/script.js"></script>
</body>
</html>
